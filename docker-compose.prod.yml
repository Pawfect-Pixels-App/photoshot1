version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: photoshot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photoshot}
      POSTGRES_DB: photoshot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoshot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://photoshot:${POSTGRES_PASSWORD:-photoshot}@postgres:5432/photoshot
      NODE_ENV: production

volumes:
  postgres_data:
