services:
  - type: web
    name: photoshot
    env: node
    plan: starter
    buildCommand: yarn install && yarn vercel-build
    startCommand: yarn start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: photoshot-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: S3_UPLOAD_KEY
        sync: false
      - key: S3_UPLOAD_SECRET
        sync: false
      - key: S3_UPLOAD_BUCKET
        sync: false
      - key: S3_UPLOAD_REGION
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_USERNAME
        sync: false
      - key: NEXT_PUBLIC_REPLICATE_INSTANCE_TOKEN
        sync: false
      - key: SECRET
        generateValue: true
      - key: REPLICATE_MAX_TRAIN_STEPS
        value: 3000
      - key: EMAIL_SERVER
        value: smtp://localhost:25

databases:
  - name: photoshot-db
    plan: starter
    databaseName: photoshot
    user: photoshot
