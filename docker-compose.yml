services:
  postgres:
    container_name: photoshot-postgres
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: photoshot
      POSTGRES_PASSWORD: photoshot
      POSTGRES_DB: photoshot
    ports:
      - "5432:5432"
    volumes:
      - postgresql:/var/lib/postgresql
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoshot -d photoshot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  maildev:
    container_name: photoshot-maildev
    image: djfarrelly/maildev
    restart: always
    ports:
      - "1080:80"
      - "25:25"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgresql:
  postgresql_data:
